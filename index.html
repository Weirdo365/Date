<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My lady🫠💕</title>
    <style>
        /* Beautiful soft gradient background */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            text-align: center;
            overflow: hidden; 
            position: relative;
        }

        /* Floating Hearts Animation */
        .hearts-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .heart-anim {
            position: absolute;
            bottom: -20px;
            font-size: 24px;
            animation: floatUp 5s infinite ease-in;
            opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0.7; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        /* Glassmorphism Card Effect */
        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.5);
            z-index: 10;
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        h1 {
            color: #ff4d4d;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            text-shadow: 1px 1px 2px rgba(255, 105, 135, 0.2);
        }
        .signature {
            color: #888;
            font-style: italic;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
        }
        button {
            font-size: 18px;
            font-weight: bold;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
        .btn-primary {
            background-color: #ff4d4d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.4);
            width: 100%;
            margin-top: 20px;
        }
        .btn-primary:hover { background-color: #ff1a1a; }
        
        #yesBtn {
            background-color: #ff4d4d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.4);
        }
        #yesBtn:hover { background-color: #ff1a1a; }
        
        #noBtn {
            background-color: #f0f0f0;
            color: #666;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        #noBtn:hover { background-color: #e0e0e0; }
        
        input[type="date"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ffbbbb;
            border-radius: 8px;
            margin-top: 15px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="date"]:focus {
            border-color: #ff4d4d;
        }
        .hidden { display: none !important; }
        .gif-container img {
            max-width: 200px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <audio id="yaySound" src="https://www.myinstants.com/media/sounds/yayyyyyyy.mp3" preload="auto"></audio>
    <audio id="awwSound" src="https://www.myinstants.com/media/sounds/emotional-damage-meme.mp3" preload="auto"></audio>

    <div class="hearts-bg" id="heartsBg"></div>

    <div class="container" id="step1">
        <h1 id="questionText">Medi, will you go on a date with me?💕🫠🎀😝</h1>
        <p class="signature">- weirdo</p>
        <div class="buttons">
            <button id="yesBtn" onclick="showDateSelection()">Yes!</button>
            <button id="noBtn" onclick="clickedNo()">No</button>
        </div>
    </div>

    <div class="container hidden" id="step2">
        <h1>Yay! ❤️</h1>
        <p>When are you free for our date?</p>
        <input type="date" id="datePicker">
        <button class="btn-primary" onclick="submitDate()">Confirm Date</button>
    </div>

    <div class="container hidden" id="step3">
        <h1>It's a Date! 🎉</h1>
        <p>I'll see you then. I've got the details.</p>
        <div class="gif-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExaGxzZ205aDQ4MjBoM2M1YnN2M3g2bGQyMWFsaGN2bzVxaXQ5dG5wNyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/VzQ9PUdifClRm/giphy.gif" alt="Happy Cat GIF">
        </div>
    </div>

    <script>
        // *** REPLACE THIS WITH YOUR REAL EMAIL ***
        const myEmail = "vaibhavp12308@gmail.com"; 

        // Generate Floating Hearts
        const heartsContainer = document.getElementById('heartsBg');
        const heartSymbols = ['❤️', '💖', '💕', '✨'];
        for (let i = 0; i < 15; i++) {
            let heart = document.createElement('div');
            heart.classList.add('heart-anim');
            heart.innerText = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's'; 
            heart.style.animationDelay = Math.random() * 3 + 's';
            heartsContainer.appendChild(heart);
        }

        // --- NEW CODE: Block past dates ---
        const dateInput = document.getElementById('datePicker');
        // Get today's date and format it as YYYY-MM-DD
        const today = new Date().toISOString().split('T')[0];
        // Set the minimum selectable date to today
        dateInput.setAttribute('min', today);
        // ----------------------------------

        // Fast Audio Variables
        const yayAudio = document.getElementById('yaySound');
        const awwAudio = document.getElementById('awwSound');

        function sendEmailNotification(answer, selectedDate) {
            fetch(`https://formsubmit.co/ajax/${myEmail}`, {
                method: "POST",
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    Message: "You have a new response from Shreya!",
                    Answer: answer,
                    DateChosen: selectedDate || "None"
                })
            })
            .then(response => console.log("Notification sent!"))
            .catch(error => console.log("Error sending notification", error));
        }

        function clickedNo() {
            awwAudio.currentTime = 0; 
            awwAudio.play();
            sendEmailNotification("She clicked NO 😢", "None");
            document.getElementById('questionText').innerText = "Are you sure? 🥺 Please say yes!";
        }

        function showDateSelection() {
            yayAudio.currentTime = 0;
            yayAudio.play();
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        function submitDate() {
            const chosenDate = document.getElementById('datePicker').value;
            if(!chosenDate) {
                alert("Please select a date first!");
                return;
            }
            sendEmailNotification("She clicked YES! ❤️", chosenDate);
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
        }
    </script>

</body>
</html>
